name: Deploy Pipeline Scripts to S3

# This triggers the workflow only when you push to the 'main' branch
# and only if files inside the 'scripts/' folder are changed.
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        # Standard region for India, change if your S3 bucket is elsewhere
        aws-region: us-east-1 

    - name: Sync scripts to S3
      # The --delete flag ensures that if you delete a script in GitHub, 
      # it also gets deleted in S3, keeping them perfectly synced.
      run: |
        aws s3 sync ./scripts s3://medallion-dev-ops-use1/scripts/ --delete